<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Blessing for You — HeartsQuest</title>
  <meta name="description" content="Draw a card. Receive a blessing. A gift from Christine Ahh at HeartsQuest.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>

    /* ── Page shell ── */
    .fortune-page {
      min-height: 100vh;
      background: #0e1428;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Animated aurora background ── */
    .aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .aurora-layer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .aurora-layer:nth-child(1) {
      background: radial-gradient(ellipse 70% 50% at 15% 25%, rgba(62,143,160,0.18) 0%, transparent 65%);
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .aurora-layer:nth-child(2) {
      background: radial-gradient(ellipse 55% 55% at 85% 75%, rgba(123,111,174,0.14) 0%, transparent 65%);
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .aurora-layer:nth-child(3) {
      background: radial-gradient(ellipse 40% 30% at 50% 50%, rgba(109,192,208,0.06) 0%, transparent 70%);
      animation: drift3 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { 0% { transform: translate(-4%,-4%) scale(1); } 100% { transform: translate(4%,6%) scale(1.1); } }
    @keyframes drift2 { 0% { transform: translate(3%,3%); } 100% { transform: translate(-5%,-4%); } }
    @keyframes drift3 { 0% { transform: scale(1); } 100% { transform: scale(1.2) translate(2%,-3%); } }

    /* ── Stars canvas ── */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.55; }

    /* ── Header (transparent) ── */
    .fortune-page .site-header {
      position: relative;
      background: transparent !important;
      box-shadow: none !important;
      z-index: 10;
    }

    /* ── Content ── */
    .fortune-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
      text-align: center;
    }

    /* ── Intro text ── */
    .fortune-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(109,192,208,0.7);
      margin-bottom: 0.5rem;
    }

    .fortune-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .fortune-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      max-width: 380px;
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }

    .fortune-instruction {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: rgba(109,192,208,0.6);
      margin-bottom: 3.5rem;
      transition: opacity 0.5s;
    }
    .fortune-instruction.hidden { opacity: 0; }

    /* ── Card spread ── */
    .cards-spread {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(1rem, 3vw, 2rem);
      margin-bottom: 3rem;
      perspective: 1400px;
    }

    .card-wrapper {
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom center;
      will-change: transform;
    }
    .card-wrapper:nth-child(1) { transform: rotate(-8deg) translateY(8px); }
    .card-wrapper:nth-child(2) { transform: rotate(0deg) translateY(0px); }
    .card-wrapper:nth-child(3) { transform: rotate(8deg) translateY(8px); }

    .card-wrapper:not(.flipped):hover {
      transform: rotate(0deg) translateY(-16px) scale(1.04) !important;
    }
    .card-wrapper.flipped {
      transform: rotate(0deg) translateY(-8px) !important;
      cursor: default;
    }

    /* ── Card 3D container ── */
    .card {
      width: clamp(140px, 22vw, 190px);
      height: clamp(230px, 36vw, 315px);
      position: relative;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-wrapper.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* ── Card back ── */
    .card-back {
      background: linear-gradient(145deg, #1e3a4a 0%, #162038 50%, #1a2e42 100%);
      border: 1px solid rgba(109,192,208,0.25);
      box-shadow: 0 12px 50px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .card-back-art {
      width: 100%;
      height: 100%;
      padding: 10px;
    }

    /* ── Card front ── */
    .card-front {
      transform: rotateY(180deg);
      background: linear-gradient(160deg, #2a6070 0%, #3d5490 50%, #4a3d7a 100%);
      border: 1px solid rgba(109,192,208,0.3);
      box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 30px rgba(109,192,208,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      gap: 0.75rem;
    }

    .card-front-rule {
      width: 40%;
      height: 1px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .card-blessing {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.35;
      text-align: center;
    }

    .card-ornament {
      font-size: 0.9rem;
      opacity: 0.4;
      color: #fff;
      flex-shrink: 0;
    }

    /* ── Glow on revealed card ── */
    .card-wrapper.flipped .card-front {
      animation: cardGlow 2s ease-in-out infinite alternate;
    }
    @keyframes cardGlow {
      from { box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 20px rgba(109,192,208,0.08); }
      to   { box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 45px rgba(109,192,208,0.22); }
    }

    /* ── Shuffle button ── */
    .shuffle-btn {
      display: inline-block;
      background: transparent;
      border: 1.5px solid rgba(109,192,208,0.4);
      color: rgba(109,192,208,0.9);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.75rem 2.2rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }
    .shuffle-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      transition: opacity 0.6s 0.4s, transform 0.6s 0.4s, background 0.2s, color 0.2s, border-color 0.2s;
    }
    .shuffle-btn:hover {
      background: rgba(109,192,208,0.1);
      border-color: rgba(109,192,208,0.7);
      color: #fff;
    }

    /* ── Return link ── */
    .fortune-return {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      transition: color 0.2s;
    }
    .fortune-return:hover { color: rgba(255,255,255,0.6); }

    /* ── Mobile tweaks ── */
    @media (max-width: 520px) {
      .cards-spread { gap: 0.75rem; }
      .card-wrapper:nth-child(1) { transform: rotate(-6deg) translateY(6px); }
      .card-wrapper:nth-child(3) { transform: rotate(6deg) translateY(6px); }
    }
  </style>
</head>

  <script>
    // ── Blessings pool ──
    const BLESSINGS = [
      "Your voice is medicine. Sing it wild and free.",
      "You are not too much. You never were.",
      "The next verse of your song is waiting.\nPick up the pen, darlin'.",
      "You are mostly water. Flow where you are meant to go.",
      "Your truth belongs here.\nEven if your voice shakes, let it sing.",
      "Breathe in. Let sound move through you.\nThe healing has already begun.",
      "Fear is a visitor.\nYour voice is home.",
      "The story you are living is sacred.\nKeep writing it.",
      "What does your heart sing for?\nThat is your answer.",
      "I see you, darlin'.\nYour true, wild self is welcome here.",
      "Every sigh, every hum, every tone\nis an act of love.",
      "You don't have to sound perfect.\nYou have to sound true.",
      "Your ancestors sang.\nTheir songs still live in you.",
      "The world needs your voice.\nNot someday. Now.",
      "Melt the wall around your heart.\nWhat wants to sing through you?",
      "This is your initiation.\nStep through. We are singing for you.",
      "You are braver than you know.\nSing anyway.",
      "Sound is the portal.\nBreathe and let yourself arrive.",
      "Your gifts are medicine.\nDon't keep them to yourself.",
      "Something in you knows the way.\nListen.",
    ];

    // ── Shuffle helper ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── State ──
    let flippedCount = 0;
    let drawn = [];

    function dealCards() {
      drawn = shuffle(BLESSINGS).slice(0, 3);
      for (let i = 0; i < 3; i++) {
        document.getElementById('blessing' + i).textContent = drawn[i];
      }
    }

    function resetCards() {
      flippedCount = 0;
      for (let i = 0; i < 3; i++) {
        const wrapper = document.getElementById('card' + i);
        wrapper.classList.remove('flipped');
        wrapper.style.pointerEvents = '';
        wrapper.setAttribute('aria-label', 'Draw card ' + (i + 1));
      }
      document.getElementById('shuffleBtn').classList.remove('visible');
      document.getElementById('instruction').classList.remove('hidden');
      dealCards();
    }

    function flipCard(idx) {
      const wrapper = document.getElementById('card' + idx);
      if (wrapper.classList.contains('flipped')) return;
      wrapper.classList.add('flipped');
      wrapper.style.pointerEvents = 'none';
      flippedCount++;

      if (flippedCount === 1) {
        document.getElementById('instruction').classList.add('hidden');
      }
      if (flippedCount >= 1) {
        document.getElementById('shuffleBtn').classList.add('visible');
      }
    }

    // ── Init ──
    dealCards();

    for (let i = 0; i < 3; i++) {
      const wrapper = document.getElementById('card' + i);
      const idx = i;
      wrapper.addEventListener('click', () => flipCard(idx));
      wrapper.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipCard(idx); }
      });
    }

    document.getElementById('shuffleBtn').addEventListener('click', resetCards);

    // ── Stars canvas ──
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const STAR_COUNT = 140;
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = Array.from({ length: STAR_COUNT }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.3,
        o: Math.random() * 0.6 + 0.1,
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2,
      }));
    }

    let animFrame;
    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const opacity = s.o * (0.65 + 0.35 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${opacity})`;
        ctx.fill();
      });
      animFrame = requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    initStars();
    drawStars(0);
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

    // ── Header / nav (reuse from script.js) ──
    const header = document.getElementById('siteHeader');
    // Fortune teller page: header always transparent, don't scroll-trigger
    const menuBtn  = document.getElementById('menuBtn');
    const navClose = document.getElementById('navClose');
    const overlay  = document.getElementById('navOverlay');
    menuBtn.addEventListener('click', () => overlay.classList.add('open'));
    navClose.addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  </script>
