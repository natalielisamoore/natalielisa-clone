<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartsQuest — Christine Ahh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1B2040; }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      background: rgba(27, 32, 64, 0.85);
      backdrop-filter: blur(10px);
    }
    nav button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    nav button:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }
    nav button.active {
      background: rgba(62,143,160,0.3);
      border-color: rgba(62,143,160,0.6);
      color: #fff;
    }

    .page-img {
      display: none;
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding-top: 48px;
    }
    .page-img.active { display: block; }
    .page-img img { width: 100%; display: block; }
  </style>
</head>
<body>

  <nav>
    <button class="active" data-page="index">Home</button>
    <button data-page="song">Song</button>
    <button data-page="sound">Sound</button>
    <button data-page="soul">Soul</button>
    <button data-page="story">Story</button>
    <button data-page="fortune-teller">Fortune</button>
    <button data-page="contact">Contact</button>
  </nav>

  <div class="page-img active" id="index"><img src="screenshots/index.png" alt="Home"></div>
  <div class="page-img" id="song"><img src="screenshots/song.png" alt="Song"></div>
  <div class="page-img" id="sound"><img src="screenshots/sound.png" alt="Sound"></div>
  <div class="page-img" id="soul"><img src="screenshots/soul.png" alt="Soul"></div>
  <div class="page-img" id="story"><img src="screenshots/story.png" alt="Story"></div>
  <div class="page-img" id="fortune-teller"><img src="screenshots/fortune-teller.png" alt="Fortune Teller"></div>
  <div class="page-img" id="contact"><img src="screenshots/contact.png" alt="Contact"></div>

  <script>
    document.querySelector('nav').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page-img').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.page).classList.add('active');
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
